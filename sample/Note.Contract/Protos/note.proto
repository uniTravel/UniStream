syntax = "proto3";

option csharp_namespace = "Note.Contract";

package note;

service Note {
    rpc CreateNoteCommand (CreateNote) returns (CreateNoteReply);
    rpc ChangeNoteCommand (ChangeNote) returns (ChangeNoteReply);
}

message CreateNote {
    string title = 1;
    string content = 2;
}

message CreateNoteReply {
    string agg_id = 1;
    string trace_id = 2;
}

message ChangeNote {
    string agg_id = 1;
    string content = 2;
}

message ChangeNoteReply {
    string trace_id = 1;
}